<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FLOTA VEHICULAR SUBZONA MANABI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1a2744 25%, #1e293b 50%, #2a1f1a 75%, #1a1a2e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 80%, rgba(59,130,246,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(234,88,12,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(34,197,94,0.04) 0%, transparent 60%);
            pointer-events: none;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .icon-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .icon-bg span {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.04;
            animation: floatIcon 20s ease-in-out infinite;
        }
        .icon-bg span:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 3rem; }
        .icon-bg span:nth-child(2) { top: 20%; right: 10%; animation-delay: -3s; font-size: 2rem; }
        .icon-bg span:nth-child(3) { top: 60%; left: 8%; animation-delay: -6s; font-size: 2.8rem; }
        .icon-bg span:nth-child(4) { top: 75%; right: 15%; animation-delay: -9s; }
        .icon-bg span:nth-child(5) { top: 40%; left: 85%; animation-delay: -12s; font-size: 2.2rem; }
        .icon-bg span:nth-child(6) { top: 85%; left: 40%; animation-delay: -15s; font-size: 3.2rem; }
        .icon-bg span:nth-child(7) { top: 5%; left: 50%; animation-delay: -2s; font-size: 2rem; }
        .icon-bg span:nth-child(8) { top: 50%; left: 30%; animation-delay: -7s; font-size: 1.8rem; }
        .icon-bg span:nth-child(9) { top: 30%; left: 65%; animation-delay: -10s; font-size: 2.5rem; }
        .icon-bg span:nth-child(10) { top: 90%; left: 70%; animation-delay: -4s; }
        .icon-bg span:nth-child(11) { top: 15%; left: 75%; animation-delay: -11s; font-size: 1.6rem; }
        .icon-bg span:nth-child(12) { top: 70%; left: 55%; animation-delay: -8s; font-size: 2.3rem; }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            50% { transform: translateY(10px) rotate(-3deg); }
            75% { transform: translateY(-8px) rotate(2deg); }
        }

        .login-box {
            background: rgba(30, 41, 59, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid #334155;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(59,130,246,0.1);
            position: relative;
            z-index: 1;
        }
        .shield {
            display: block;
            margin: 0 auto 1rem;
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(59,130,246,0.3));
        }
        .login-box h1 { color: #3b82f6; text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .login-box .subtitle { color: #64748b; text-align: center; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
        .form-group label { color: #94a3b8; font-size: 0.85rem; }
        .form-group input { padding: 0.8rem 1rem; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .btn { width: 100%; padding: 0.85rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; background: linear-gradient(135deg, #3b82f6, #ea580c); color: white; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59,130,246,0.4); }
        .error { background: #7f1d1d; color: #fca5a5; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; }

        .footer-credit {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 1.5rem;
            color: #475569;
            font-size: 0.8rem;
            margin-top: 2rem;
        }
        .footer-credit .name { color: #64748b; }
        .footer-credit .role { color: #3b82f6; font-weight: 600; }

        @media (max-width: 768px) {
            .login-box { padding: 2rem 1.5rem; }
            .login-box h1 { font-size: 1.3rem; }
            .icon-bg span { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="icon-bg">
        <span>&#128663;</span>
        <span>&#128295;</span>
        <span>&#128736;</span>
        <span>&#9881;</span>
        <span>&#128666;</span>
        <span>&#128674;</span>
        <span>&#128295;</span>
        <span>&#128736;</span>
        <span>&#9881;</span>
        <span>&#128663;</span>
        <span>&#128666;</span>
        <span>&#128736;</span>
    </div>
    <div class="login-box">
        <img src="/static/escudo_policia.png" alt="Policia Nacional del Ecuador" class="shield">
        <h1>FLOTA VEHICULAR SUBZONA MANABI</h1>
        <div class="subtitle">Inicia sesion para continuar</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="Tu usuario" required autofocus>
            </div>
            <div class="form-group">
                <label>Contrasena</label>
                <input type="password" name="password" placeholder="Tu contrasena" required>
            </div>
            <button type="submit" class="btn">Ingresar</button>
        </form>
    </div>
    <div class="footer-credit">
        <div class="name">Creado por Poli. Loor Cevallos Willian Albiery</div>
        <div class="role">Coordinador Mecanico</div>
    </div>
</body>
</html>
